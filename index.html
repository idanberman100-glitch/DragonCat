<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Spark of the Dragon-Cat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', sans-serif;
            background-color: #f0fdf4;
            background-image: radial-gradient(#bbf7d0 2px, transparent 2px);
            background-size: 30px 30px;
            margin: 0;
            overflow-x: hidden;
        }
        
        /* Game Canvas Styling */
        #gameCanvas {
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            max-width: 100%;
            height: auto;
            touch-action: none;
            transition: background 1.5s ease-in-out;
        }

        /* Mobile Controls */
        .touch-btn {
            background-color: rgba(255, 255, 255, 0.7);
            border: 4px solid #4ade80;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            color: #16a34a;
            user-select: none;
            cursor: pointer;
        }
        .touch-btn:active {
            background-color: #bbf7d0;
            transform: scale(0.95);
        }
        .action-btn {
            border-color: #f59e0b;
            color: #d97706;
        }

        /* CSS Animations for UI */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.95; }
        }
        .animate-pulse-soft { animation: pulse-soft 2s infinite; }
    </style>
</head>
<body class="text-slate-800 p-4 sm:p-8 min-h-screen flex flex-col items-center">

    <div id="main-menu" class="max-w-2xl w-full flex flex-col items-center justify-center mt-10 space-y-8 bg-white p-10 rounded-3xl shadow-2xl border-8 border-green-400 text-center">
        <h1 class="text-5xl md:text-7xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-orange-500 via-green-500 to-purple-600 drop-shadow-md pb-4">
            The Spark of the Dragon-Cat
        </h1>
        
        <!-- Animated Cinder Menu Icon -->
        <svg class="w-48 h-48 drop-shadow-xl animate-float" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <path d="M 40 50 Q 75 40 85 65 L 75 85 Q 55 90 40 85 Z" fill="#10b981" />
            <path d="M 55 55 Q 75 45 85 70 Q 70 75 55 65 Z" fill="#059669" />
            <ellipse cx="45" cy="70" rx="18" ry="22" fill="#f97316" />
            <circle cx="45" cy="40" r="18" fill="#f97316" />
            <polygon points="30,28 20,14 38,24" fill="#c2410c" />
            <polygon points="60,28 70,14 52,24" fill="#c2410c" />
            <circle cx="38" cy="38" r="4.5" fill="#fff" />
            <circle cx="52" cy="38" r="4.5" fill="#fff" />
            <circle cx="39" cy="38" r="2.5" fill="#000" />
            <circle cx="51" cy="38" r="2.5" fill="#000" />
            <ellipse cx="45" cy="45" rx="3.5" ry="2" fill="#fda4af" />
        </svg>

        <p class="text-xl text-slate-600 font-bold">Choose your adventure!</p>

        <div class="flex flex-col sm:flex-row gap-6 w-full justify-center">
            <button onclick="showStorySelect()" class="px-8 py-4 bg-orange-500 hover:bg-orange-400 text-white text-2xl font-bold rounded-2xl shadow-lg border-b-4 border-orange-700 transition transform hover:-translate-y-1 animate-pulse-soft" style="animation-delay: 0.5s;">
                📖 Story Mode
            </button>
            <button onclick="showGameSelect()" class="px-8 py-4 bg-purple-500 hover:bg-purple-400 text-white text-2xl font-bold rounded-2xl shadow-lg border-b-4 border-purple-700 transition transform hover:-translate-y-1 animate-pulse-soft">
                🎮 Game Mode
            </button>
        </div>
    </div>

    <div id="story-select-menu" class="hidden max-w-2xl w-full flex flex-col items-center justify-center mt-10 space-y-8 bg-white p-10 rounded-3xl shadow-2xl border-8 border-orange-400 text-center">
        <h2 class="text-4xl font-extrabold text-orange-600 mb-4 drop-shadow-md">The Library</h2>
        <div class="flex flex-col gap-6 w-full">
            <button onclick="location.href='book1.html'" class="px-8 py-6 bg-green-500 hover:bg-green-400 text-white text-2xl font-bold rounded-2xl shadow-lg border-b-4 border-green-700 transition transform hover:-translate-y-1 flex flex-col items-center">
                <span>📘 Book 1: The Spark of the Dragon-Cat</span>
            </button>
            <button onclick="location.href='book2.html'" class="px-8 py-6 bg-blue-500 hover:bg-blue-400 text-white text-2xl font-bold rounded-2xl shadow-lg border-b-4 border-blue-700 transition transform hover:-translate-y-1 flex flex-col items-center">
                <span>📙 Book 2: Defenders of Whiskerton</span>
            </button>
        </div>
        <button onclick="showMenu()" class="mt-4 px-6 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold rounded-xl shadow border-b-4 border-slate-400">⬅ Back to Main Menu</button>
    </div>

    <div id="game-select-menu" class="hidden max-w-2xl w-full flex flex-col items-center justify-center mt-10 space-y-8 bg-white p-10 rounded-3xl shadow-2xl border-8 border-purple-400 text-center">
        <h2 class="text-4xl font-extrabold text-purple-700 mb-4 drop-shadow-md">Select Game Type</h2>
        <div class="flex flex-col gap-6 w-full">
            <button onclick="showCharacterSelect('classic')" class="px-8 py-6 bg-sky-500 hover:bg-sky-400 text-white text-2xl font-bold rounded-2xl shadow-lg border-b-4 border-sky-700 transition transform hover:-translate-y-1 flex flex-col items-center">
                <span>🏃 Classic Platformer</span>
                <span class="text-sm font-normal mt-2 opacity-90">Focus on puzzle jumping and exploration. No enemies!</span>
            </button>
            <button onclick="showCharacterSelect('fighting')" class="px-8 py-6 bg-red-500 hover:bg-red-400 text-white text-2xl font-bold rounded-2xl shadow-lg border-b-4 border-red-700 transition transform hover:-translate-y-1 flex flex-col items-center">
                <span>⚔️ Platformer Fighting</span>
                <span class="text-sm font-normal mt-2 opacity-90">Action packed! Fight enemies and Bosses across one giant map!</span>
            </button>
        </div>
        <button onclick="showMenu()" class="mt-4 px-6 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold rounded-xl shadow border-b-4 border-slate-400">⬅ Back</button>
    </div>

    <div id="character-select-menu" class="hidden max-w-4xl w-full flex flex-col items-center justify-center mt-10 space-y-6 bg-white p-10 rounded-3xl shadow-2xl border-8 border-cyan-400 text-center">
        <h2 class="text-4xl font-extrabold text-cyan-600 mb-2 drop-shadow-md">Select Your Hero</h2>
        <p class="text-lg text-slate-500 font-bold mb-4">Choose a specific hero to play as for the entire map!</p>
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 w-full">
            <button onclick="goGame(0, 'fire')" class="p-4 bg-orange-500 hover:bg-orange-400 text-white font-bold rounded-2xl shadow-md border-b-4 border-orange-700 transition transform hover:-translate-y-1">🔥 Fire Cinder</button>
            <button onclick="goGame(1, 'water')" class="p-4 bg-blue-500 hover:bg-blue-400 text-white font-bold rounded-2xl shadow-md border-b-4 border-blue-700 transition transform hover:-translate-y-1">💧 Water Cinder</button>
            <button onclick="goGame(2, 'earth')" class="p-4 bg-green-600 hover:bg-green-500 text-white font-bold rounded-2xl shadow-md border-b-4 border-green-800 transition transform hover:-translate-y-1">🪨 Earth Cinder</button>
            <button onclick="goGame(3, 'wind')" class="p-4 bg-yellow-400 hover:bg-yellow-300 text-slate-800 font-bold rounded-2xl shadow-md border-b-4 border-yellow-600 transition transform hover:-translate-y-1">🌪️ Wind Cinder</button>
            <button onclick="goGame(4, 'space')" class="p-4 bg-purple-600 hover:bg-purple-500 text-white font-bold rounded-2xl shadow-md border-b-4 border-purple-800 transition transform hover:-translate-y-1">🌌 Space Cinder</button>
            <button onclick="goGame(5, 'frost')" class="p-4 bg-cyan-400 hover:bg-cyan-300 text-slate-800 font-bold rounded-2xl shadow-md border-b-4 border-cyan-600 transition transform hover:-translate-y-1">❄️ Frost</button>
            <button onclick="goGame(6, 'flare')" class="p-4 bg-yellow-300 hover:bg-yellow-200 text-slate-800 font-bold rounded-2xl shadow-md border-b-4 border-yellow-500 transition transform hover:-translate-y-1">☀️ Flare</button>
            <button onclick="goGame(7, 'jett')" class="p-4 bg-slate-600 hover:bg-slate-500 text-white font-bold rounded-2xl shadow-md border-b-4 border-slate-800 transition transform hover:-translate-y-1">💨 Jett</button>
            <button onclick="goGame(0, 'spike')" class="col-span-2 md:col-span-4 p-4 bg-amber-800 hover:bg-amber-700 text-white text-xl font-bold rounded-2xl shadow-md border-b-4 border-amber-950 transition transform hover:-translate-y-1">🐕 Play as Spike (High Damage, Earthquake!)</button>
            <button onclick="goGame(0, null)" class="col-span-2 md:col-span-4 p-4 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold rounded-2xl shadow border-b-4 border-slate-400 transition transform hover:-translate-y-1">🗺️ Classic Progression (Forms unlock as you go!)</button>
        </div>
        <button onclick="showGameSelect()" class="mt-4 px-6 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold rounded-xl shadow border-b-4 border-slate-400">⬅ Back</button>
    </div>

    <script>
        // Simple menu navigation for the home page. The books and the game
        // live in their own files (book1.html, book2.html, game.html).
        let pendingGameMode = 'classic';
        function hide(id){ const e = document.getElementById(id); if (e){ e.classList.add('hidden'); e.classList.remove('flex'); } }
        function show(id){ const e = document.getElementById(id); if (e){ e.classList.remove('hidden'); e.classList.add('flex'); } }
        function showMenu(){ show('main-menu'); hide('story-select-menu'); hide('game-select-menu'); hide('character-select-menu'); }
        function showStorySelect(){ hide('main-menu'); hide('game-select-menu'); hide('character-select-menu'); show('story-select-menu'); }
        function showGameSelect(){ hide('main-menu'); hide('character-select-menu'); show('game-select-menu'); }
        function showCharacterSelect(mode){ pendingGameMode = mode; hide('game-select-menu'); show('character-select-menu'); }
        function goGame(start, form){ let u = 'game.html?mode=' + pendingGameMode + '&start=' + start; if (form) u += '&form=' + form; location.href = u; }
        showMenu();
    </script>
</body>
</html>
